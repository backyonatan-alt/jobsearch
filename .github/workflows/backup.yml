name: backup

# TEMP OVERRIDE (branch cohort-read-jul16) — read-only aggregate cohort read v2.
# Disambiguates "no students came" from "students signed in with a personal
# Gmail" (invite went to @post.bgu.ac.il but sign-in is Google OAuth). Aggregate
# buckets only — no individual emails. main's backup.yml is untouched.

on:
  workflow_dispatch:

jobs:
  cohort_read:
    runs-on: ubuntu-latest
    steps:
      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Read-only signup disambiguation
        run: |
          cat > /tmp/q.sql <<'SQL'
          WITH n AS (
            SELECT id, lower(email) em, created_at FROM users WHERE created_at >= '2026-07-13'
          )
          SELECT 'new_users_total_since_jul13' AS metric, count(*)::text AS value FROM n
          UNION ALL SELECT 'new_by_day', coalesce(string_agg(d||':'||c,' '),'-') FROM (
            SELECT date(created_at)::text d, count(*)::text c FROM n GROUP BY 1 ORDER BY 1) t
          UNION ALL SELECT 'new_bgu_domain',  count(*)::text FROM n WHERE em LIKE '%bgu.ac.il'
          UNION ALL SELECT 'new_gmail',       count(*)::text FROM n WHERE em LIKE '%@gmail.com'
          UNION ALL SELECT 'new_other',       count(*)::text FROM n
            WHERE em NOT LIKE '%bgu.ac.il' AND em NOT LIKE '%@gmail.com'
          UNION ALL SELECT 'any_bgu_users_alltime', count(*)::text FROM users
            WHERE lower(email) LIKE '%bgu.ac.il'
          UNION ALL SELECT 'total_users_alltime', count(*)::text FROM users
          UNION ALL SELECT 'new_users_created_app', count(DISTINCT a.user_id)::text
            FROM applications a JOIN n ON n.id=a.user_id WHERE coalesce(a.notes,'') NOT LIKE '%[demo]%'
          UNION ALL SELECT 'new_users_reached_playbook', count(DISTINCT a.user_id)::text
            FROM dossiers d JOIN applications a ON a.id=d.application_id JOIN n ON n.id=a.user_id
          UNION ALL SELECT 'new_users_notthem_events', count(*)::text
            FROM events e JOIN n ON n.id=e.user_id
            WHERE e.name IN ('identity_rejected','identity_reresearch_submitted','reground');
          SQL
          scp -o StrictHostKeyChecking=no /tmp/q.sql "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/cohort_q.sql"
          echo "=========== SIGNUP DISAMBIGUATION (Jul 16) ==========="
          ssh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" '
            chmod 644 /tmp/cohort_q.sql
            sudo -u postgres psql jobsearch -A -F"|" -v ON_ERROR_STOP=1 -f /tmp/cohort_q.sql
            rm -f /tmp/cohort_q.sql
          '
          echo "====================================================="
