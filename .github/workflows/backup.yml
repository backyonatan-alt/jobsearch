name: backup

# TEMPORARY branch-only override (Jul 21 2026): read-only aggregate snapshot
# for the GA4-vs-real-users check. Counts only — no emails, no row data.
# Reverted on this branch right after the run; never merged to main.

on:
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    steps:
      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Read-only aggregate snapshot
        run: |
          cat > read.sql <<'SQL'
          \echo ===TOTAL_USERS===
          SELECT count(*) AS total_users FROM users;
          \echo ===SIGNUPS_PER_DAY_LAST_8D_BY_DOMAIN_CLASS===
          SELECT created_at::date AS day,
                 CASE WHEN email ILIKE '%bgu.ac.il' THEN 'bgu'
                      WHEN email ILIKE '%gmail.com' THEN 'gmail'
                      ELSE 'other' END AS domain_class,
                 count(*) AS signups
          FROM users
          WHERE created_at >= now() - interval '8 days'
          GROUP BY 1, 2 ORDER BY 1, 2;
          \echo ===DAILY_ACTIVE_USERS_ANY_EVENT_LAST_8D===
          SELECT created_at::date AS day,
                 count(DISTINCT user_id) AS active_users,
                 count(*) AS events
          FROM events
          WHERE created_at >= now() - interval '8 days'
          GROUP BY 1 ORDER BY 1;
          \echo ===LOGINS_PER_DAY_LAST_8D_BY_SRC===
          SELECT created_at::date AS day,
                 coalesce(props->>'src', '-') AS src,
                 count(DISTINCT user_id) AS users,
                 count(*) AS logins
          FROM events
          WHERE name = 'login' AND created_at >= now() - interval '8 days'
          GROUP BY 1, 2 ORDER BY 1, 2;
          \echo ===POST_DOMAIN_COHORT_FUNNEL_SINCE_JUL16===
          SELECT count(*) AS cohort_n,
                 count(*) FILTER (WHERE EXISTS (
                   SELECT 1 FROM applications a
                   WHERE a.user_id = u.id AND coalesce(a.notes, '') NOT LIKE '[demo]%'
                 )) AS with_real_app,
                 count(*) FILTER (WHERE EXISTS (
                   SELECT 1 FROM applications a
                   JOIN dossiers d ON d.application_id = a.id
                   WHERE a.user_id = u.id
                 )) AS with_playbook
          FROM users u
          WHERE u.created_at >= '2026-07-16';
          \echo ===EVENT_ROLLUP_SINCE_JUL16===
          SELECT name, count(DISTINCT user_id) AS users, count(*) AS n
          FROM events
          WHERE created_at >= '2026-07-16'
          GROUP BY 1 ORDER BY n DESC LIMIT 30;
          SQL
          ssh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            'sudo -u postgres psql -d jobsearch -v ON_ERROR_STOP=1 -P pager=off' < read.sql
