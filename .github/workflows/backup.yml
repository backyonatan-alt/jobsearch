name: backup

# TEMP OVERRIDE (branch cohort-read-jul20) — read-only aggregate cohort read.
# Jul 20 re-read of the BGU student invite: Jul 13 send (raw-IP link, zero) +
# Jul 16 re-send (pursuit-playbook.com). Same throwaway pattern as Jul 7/12/16:
# override backup.yml on a branch, dispatch against it, read logs, delete the
# branch — main untouched. SELECT/COUNT only; counts and dates, no PII.

on:
  workflow_dispatch:

jobs:
  cohort_read:
    runs-on: ubuntu-latest
    steps:
      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Read-only cohort aggregates
        run: |
          cat > /tmp/q.sql <<'SQL'
          WITH n AS (
            SELECT id, lower(email) em, created_at, prep_credits_used, prep_credits_limit
            FROM users WHERE created_at >= '2026-07-13'
          )
          SELECT 'new_users_since_jul13' AS metric, count(*)::text AS value FROM n
          UNION ALL SELECT 'new_by_day', coalesce(string_agg(d||':'||c,' '),'-') FROM (
            SELECT date(created_at)::text d, count(*)::text c FROM n GROUP BY 1 ORDER BY 1) t
          UNION ALL SELECT 'bucket_bgu',   count(*)::text FROM n WHERE em LIKE '%bgu.ac.il'
          UNION ALL SELECT 'bucket_gmail', count(*)::text FROM n WHERE em LIKE '%@gmail.com'
          UNION ALL SELECT 'bucket_other', count(*)::text FROM n
            WHERE em NOT LIKE '%bgu.ac.il' AND em NOT LIKE '%@gmail.com'
          UNION ALL SELECT 'created_real_app_users', count(DISTINCT a.user_id)::text
            FROM applications a JOIN n ON n.id=a.user_id
            WHERE coalesce(a.notes,'') NOT LIKE '%[demo]%'
          UNION ALL SELECT 'reached_playbook_users', count(DISTINCT a.user_id)::text
            FROM dossiers d JOIN applications a ON a.id=d.application_id JOIN n ON n.id=a.user_id
          UNION ALL SELECT 'pf_view_users', count(DISTINCT e.user_id)::text
            FROM events e JOIN n ON n.id=e.user_id WHERE e.name='prepfirst_prompt_view'
          UNION ALL SELECT 'pf_submit_users', count(DISTINCT e.user_id)::text
            FROM events e JOIN n ON n.id=e.user_id WHERE e.name='prepfirst_submit'
          UNION ALL SELECT 'pf_ok_users', count(DISTINCT e.user_id)::text
            FROM events e JOIN n ON n.id=e.user_id WHERE e.name='prepfirst_generate_ok'
          UNION ALL SELECT 'pf_error_events', count(*)::text
            FROM events e JOIN n ON n.id=e.user_id WHERE e.name='prepfirst_generate_error'
          UNION ALL SELECT 'GROUNDING_notthem_users', count(DISTINCT e.user_id)::text
            FROM events e JOIN n ON n.id=e.user_id
            WHERE e.name IN ('identity_rejected','identity_reresearch_submitted')
          UNION ALL SELECT 'identity_confirmed_events', count(*)::text
            FROM events e JOIN n ON n.id=e.user_id WHERE e.name='identity_confirmed'
          UNION ALL SELECT 'retention_multiday_users', count(*)::text FROM (
            SELECT e.user_id FROM events e JOIN n ON n.id=e.user_id
            GROUP BY e.user_id HAVING count(DISTINCT date(e.created_at)) >= 2) t
          UNION ALL SELECT 'debrief_view_users', count(DISTINCT e.user_id)::text
            FROM events e JOIN n ON n.id=e.user_id WHERE e.name='debrief_prompt_view'
          UNION ALL SELECT 'debrief_saved_rows', count(*)::text
            FROM debriefs d JOIN n ON n.id=d.user_id
          UNION ALL SELECT 'credits_used_total', coalesce(sum(prep_credits_used),0)::text FROM n
          UNION ALL SELECT 'users_at_cap', count(*)::text FROM n
            WHERE prep_credits_limit < 1000 AND prep_credits_used >= prep_credits_limit
          UNION ALL SELECT 'total_users_alltime', count(*)::text FROM users;
          SQL
          scp -o StrictHostKeyChecking=no /tmp/q.sql "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/cohort_q.sql"
          echo "=========== BGU COHORT RE-READ (Jul 20) ==========="
          ssh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" '
            chmod 644 /tmp/cohort_q.sql
            sudo -u postgres psql jobsearch -A -F"|" -v ON_ERROR_STOP=1 -f /tmp/cohort_q.sql
            rm -f /tmp/cohort_q.sql
          '
          echo "==================================================="
