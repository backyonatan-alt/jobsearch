name: backup

# BRANCH-ONLY OVERRIDE (claude/next-steps-analysis-kyr1xc): Jul 13 wave
# re-read, run Jul 12 by user request. Read-only aggregate counts only —
# NO emails or per-user rows (public repo, public logs). Restored after use.

on:
  workflow_dispatch:

jobs:
  wave-reread:
    runs-on: ubuntu-latest
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Write wave re-read SQL
        run: |
          cat > /tmp/wave.sql <<'SQL'
          \pset pager off
          \echo === Q1a: signups per day since Jul 1 (non-admin) ===
          SELECT (created_at AT TIME ZONE 'Asia/Jerusalem')::date AS day, count(*) AS signups
          FROM users WHERE NOT is_admin AND created_at >= '2026-07-01'
          GROUP BY 1 ORDER BY 1;

          \echo === Q1b: login attribution since Jul 5 (non-admin) ===
          SELECT COALESCE(NULLIF(e.props->>'src',''),'organic') AS src,
                 count(*) AS logins, count(DISTINCT e.user_id) AS users
          FROM events e JOIN users u ON u.id = e.user_id AND NOT u.is_admin
          WHERE e.name = 'login' AND e.created_at >= '2026-07-05'
          GROUP BY 1 ORDER BY 3 DESC;

          \echo === Q2a: prepfirst funnel — wave cohort (users created >= Jul 5, non-admin) ===
          WITH cohort AS (SELECT id FROM users WHERE NOT is_admin AND created_at >= '2026-07-05')
          SELECT e.name, count(DISTINCT e.user_id) AS users, count(*) AS n
          FROM events e JOIN cohort c ON c.id = e.user_id
          WHERE e.name IN ('prepfirst_prompt_view','prepfirst_submit','prepfirst_generate_ok',
                           'prepfirst_generate_error','prepfirst_skip')
          GROUP BY 1 ORDER BY 2 DESC;

          \echo === Q2b: wave cohort depth — real apps + playbooks ===
          WITH cohort AS (SELECT id FROM users WHERE NOT is_admin AND created_at >= '2026-07-05')
          SELECT
            (SELECT count(*) FROM cohort) AS cohort_users,
            (SELECT count(DISTINCT a.user_id) FROM applications a JOIN cohort c ON c.id = a.user_id
              WHERE (a.notes IS NULL OR a.notes NOT LIKE '[demo] %')) AS users_with_real_app,
            (SELECT count(DISTINCT a.user_id) FROM dossiers d
              JOIN applications a ON a.id = d.application_id
              JOIN cohort c ON c.id = a.user_id) AS users_with_playbook;

          \echo === Q3a: debrief funnel since Jul 5 (non-admin) ===
          SELECT e.name, COALESCE(e.props->>'surface','') AS surface,
                 count(*) AS n, count(DISTINCT e.user_id) AS users
          FROM events e JOIN users u ON u.id = e.user_id AND NOT u.is_admin
          WHERE e.name IN ('debrief_prompt_view','debrief_save') AND e.created_at >= '2026-07-05'
          GROUP BY 1, 2 ORDER BY 1, 3 DESC;

          \echo === Q3b: real debrief rows (all time, non-admin) ===
          SELECT count(*) AS debriefs, count(DISTINCT d.user_id) AS users
          FROM debriefs d JOIN users u ON u.id = d.user_id AND NOT u.is_admin;

          \echo === Q4: prep-credit burn (non-admin) ===
          SELECT count(*) FILTER (WHERE prep_credits_used > 0) AS users_spent,
                 sum(prep_credits_used) AS total_credits,
                 max(prep_credits_used) AS max_per_user,
                 count(*) FILTER (WHERE prep_credits_used >= prep_credits_limit) AS at_limit
          FROM users WHERE NOT is_admin;

          \echo === Q5: prepfirst_generate_error reasons since Jul 5 ===
          SELECT props->>'step' AS step,
                 COALESCE(NULLIF(props->>'reason',''),'(empty)') AS reason,
                 count(*) AS n,
                 max((created_at AT TIME ZONE 'Asia/Jerusalem')::date) AS last_day
          FROM events WHERE name = 'prepfirst_generate_error' AND created_at >= '2026-07-05'
          GROUP BY 1, 2 ORDER BY 3 DESC;

          \echo === Q6a: RETENTION — wave cohort (created Jul 5-9) return on a later day ===
          WITH cohort AS (
            SELECT id, (created_at AT TIME ZONE 'Asia/Jerusalem')::date AS d0
            FROM users WHERE NOT is_admin
              AND created_at >= '2026-07-05' AND created_at < '2026-07-10')
          SELECT count(*) AS cohort_users,
            count(*) FILTER (WHERE EXISTS (SELECT 1 FROM events e WHERE e.user_id = c.id
              AND (e.created_at AT TIME ZONE 'Asia/Jerusalem')::date > c.d0)) AS returned_later_day,
            count(*) FILTER (WHERE EXISTS (SELECT 1 FROM events e WHERE e.user_id = c.id
              AND e.name IN ('dossier_open','dossier_refresh')
              AND (e.created_at AT TIME ZONE 'Asia/Jerusalem')::date > c.d0)) AS returned_to_playbook
          FROM cohort c;

          \echo === Q6b: distinct active days per wave-cohort user ===
          WITH cohort AS (SELECT id FROM users WHERE NOT is_admin
            AND created_at >= '2026-07-05' AND created_at < '2026-07-10')
          SELECT days_active, count(*) AS users FROM (
            SELECT e.user_id,
                   count(DISTINCT (e.created_at AT TIME ZONE 'Asia/Jerusalem')::date) AS days_active
            FROM events e JOIN cohort c ON c.id = e.user_id GROUP BY 1) t
          GROUP BY 1 ORDER BY 1;

          \echo === Q6c: daily distinct active users since Jul 5 (all non-admin) ===
          SELECT (e.created_at AT TIME ZONE 'Asia/Jerusalem')::date AS day,
                 count(DISTINCT e.user_id) AS active_users
          FROM events e JOIN users u ON u.id = e.user_id AND NOT u.is_admin
          WHERE e.created_at >= '2026-07-05'
          GROUP BY 1 ORDER BY 1;

          \echo === Q7: event volume by name, last 7 days (non-admin) ===
          SELECT e.name, count(*) AS n, count(DISTINCT e.user_id) AS users
          FROM events e JOIN users u ON u.id = e.user_id AND NOT u.is_admin
          WHERE e.created_at >= now() - interval '7 days'
          GROUP BY 1 ORDER BY 3 DESC, 2 DESC;
          SQL

      - name: Run on the VM
        run: |
          scp /tmp/wave.sql "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/wave.sql"
          ssh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            'sudo -u postgres psql -d jobsearch -f /tmp/wave.sql; rm -f /tmp/wave.sql'
