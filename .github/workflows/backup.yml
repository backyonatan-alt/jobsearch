name: backup

# BRANCH-ONLY OVERRIDE (claude/linkedin-post-data-impact-l70fd3): read-only
# depth-of-use snapshot feeding the strategy research. Aggregate counts only —
# NO emails or per-user rows (public repo, public logs). Restored after use.

on:
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    steps:
      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Write depth-of-use SQL
        run: |
          cat > /tmp/depth.sql <<'SQL'
          \pset pager off
          \echo === recency buckets (non-admin users) ===
          SELECT CASE
                   WHEN last_login_at >= now() - interval '7 days' THEN '1_active_7d'
                   WHEN last_login_at >= now() - interval '21 days' THEN '2_cooling_8_21d'
                   ELSE '3_dormant_21d_plus'
                 END AS bucket, count(*) AS users
          FROM users WHERE NOT is_admin AND last_login_at IS NOT NULL
          GROUP BY 1 ORDER BY 1;

          \echo === distinct active days per user (events, non-admin) — stickiness ===
          SELECT days_active, count(*) AS users FROM (
            SELECT e.user_id, count(DISTINCT (e.created_at AT TIME ZONE 'Asia/Jerusalem')::date) AS days_active
            FROM events e JOIN users u ON u.id = e.user_id AND NOT u.is_admin
            GROUP BY e.user_id
          ) t GROUP BY 1 ORDER BY 1;

          \echo === playbooks (dossiers) per non-admin user ===
          SELECT briefs, count(*) AS users FROM (
            SELECT u.id, count(d.application_id) AS briefs
            FROM users u
            LEFT JOIN applications a ON a.user_id = u.id
            LEFT JOIN dossiers d ON d.application_id = a.id
            WHERE NOT u.is_admin
            GROUP BY u.id
          ) t GROUP BY 1 ORDER BY 1;

          \echo === real applications per non-admin user ===
          SELECT apps, count(*) AS users FROM (
            SELECT u.id, count(a.id) AS apps
            FROM users u LEFT JOIN applications a ON a.user_id = u.id
              AND (a.notes IS NULL OR a.notes NOT LIKE '[demo] %')
            WHERE NOT u.is_admin
            GROUP BY u.id
          ) t GROUP BY 1 ORDER BY 1;

          \echo === users returning on a later calendar day than signup (non-admin) ===
          SELECT count(*) AS returned_users FROM users u
          WHERE NOT is_admin AND EXISTS (
            SELECT 1 FROM events e WHERE e.user_id = u.id
              AND (e.created_at AT TIME ZONE 'Asia/Jerusalem')::date
                > (u.created_at AT TIME ZONE 'Asia/Jerusalem')::date);

          \echo === interview rounds + debriefs coverage (non-admin) ===
          SELECT
            (SELECT count(DISTINCT i.user_id) FROM interviews i JOIN users u ON u.id = i.user_id AND NOT u.is_admin) AS users_with_rounds,
            (SELECT count(*) FROM interviews i JOIN users u ON u.id = i.user_id AND NOT u.is_admin) AS total_rounds,
            (SELECT count(*) FROM debriefs d JOIN users u ON u.id = d.user_id AND NOT u.is_admin) AS real_debriefs;

          \echo === event volume by name, last 30 days (non-admin) ===
          SELECT e.name, count(*) AS n, count(DISTINCT e.user_id) AS users
          FROM events e JOIN users u ON u.id = e.user_id AND NOT u.is_admin
          WHERE e.created_at >= now() - interval '30 days'
          GROUP BY 1 ORDER BY 3 DESC, 2 DESC;
          SQL

      - name: Run on the VM
        run: |
          scp /tmp/depth.sql "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/depth.sql"
          ssh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            'sudo -u postgres psql -d jobsearch -f /tmp/depth.sql; rm -f /tmp/depth.sql'
