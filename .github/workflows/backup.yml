name: backup

# BRANCH-ONLY OVERRIDE (claude/linkedin-post-data-impact-l70fd3): read-only
# diagnostics for the Jul 7 generate-failure investigation. Aggregate counts
# only — NO emails or per-user rows (public repo, public logs). Restored to
# main's content once done.

on:
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    steps:
      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Write diagnostics SQL
        run: |
          cat > /tmp/diag.sql <<'SQL'
          \pset pager off
          \echo === error users: did they end up with a dossier? ===
          WITH errs AS (
            SELECT DISTINCT user_id FROM events
            WHERE name = 'prepfirst_generate_error' AND created_at >= '2026-07-06 21:00+00'
          )
          SELECT (SELECT count(*) FROM errs) AS err_users,
                 count(*) FILTER (WHERE EXISTS (
                   SELECT 1 FROM dossiers d JOIN applications a ON a.id = d.application_id
                   WHERE a.user_id = e.user_id)) AS with_dossier
          FROM errs e;

          \echo === debrief_save: admin or real user ===
          SELECT u.is_admin, count(*) AS saves
          FROM events ev JOIN users u ON u.id = ev.user_id
          WHERE ev.name = 'debrief_save' GROUP BY 1;

          \echo === prep credit burn ===
          SELECT sum(prep_credits_used) AS credits_used_total,
                 count(*) FILTER (WHERE prep_credits_used > 0) AS users_spent
          FROM users;

          \echo === briefs generated per day since Jul 4 (Israel time) ===
          SELECT (generated_at AT TIME ZONE 'Asia/Jerusalem')::date AS day, count(*) AS briefs
          FROM dossiers WHERE generated_at >= '2026-07-03 21:00+00'
          GROUP BY 1 ORDER BY 1;

          \echo === dossier_refresh outcomes + duration since Jul 4 ===
          SELECT COALESCE(props->>'outcome','?') AS outcome, count(*) AS n,
                 round(percentile_cont(0.5) WITHIN GROUP (ORDER BY (props->>'duration_ms')::bigint)) AS p50_ms,
                 round(percentile_cont(0.95) WITHIN GROUP (ORDER BY (props->>'duration_ms')::bigint)) AS p95_ms
          FROM events
          WHERE name = 'dossier_refresh' AND created_at >= '2026-07-03 21:00+00'
          GROUP BY 1;
          SQL

      - name: Run diagnostics on the VM
        run: |
          scp /tmp/diag.sql "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/diag.sql"
          ssh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" '
            sudo -u postgres psql -d jobsearch -f /tmp/diag.sql; rm -f /tmp/diag.sql
            echo "=== live nginx AI-endpoint timeouts ==="
            sudo grep -E "location|proxy_read_timeout" /etc/nginx/sites-available/pursuit.conf
          '
