name: deploy

# Stub. Wire up DEPLOY_HOST / DEPLOY_USER / DEPLOY_SSH_KEY secrets once the
# Hetzner VM exists, then enable this workflow by changing the `if` below.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build static linux binary
        run: |
          mkdir -p bin
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags='-s -w' -o bin/server ./cmd/server

      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          # DEPLOY_SSH_KEY is stored base64-encoded so newlines/CRLF can't be
          # mangled by the GitHub secret form. Decode it before use.
          echo "${{ secrets.DEPLOY_SSH_KEY }}" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Rsync artifacts
        run: |
          rsync -avz --delete \
            bin/ \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/jobsearch/bin/"
          rsync -avz --delete \
            migrations/ \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/jobsearch/migrations/"
          rsync -avz --delete \
            web/ \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/jobsearch/web/"

      - name: Restart service + health check
        run: |
          ssh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            'sudo systemctl restart jobsearch && sleep 2 && curl -fsS http://localhost:8080/healthz'
