# /etc/nginx/sites-available/pursuit.conf
# Carry the Aegis pattern: nginx terminates TLS and proxies to the Go server.
# Retry on 502/503/504 so a quick `systemctl restart jobsearch` doesn't show
# users a broken page during a deploy.

server {
    listen 80;
    listen [::]:80;
    server_name pursuit.example.com;
    # certbot --nginx will rewrite this once a cert is issued.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pursuit.example.com;

    # ssl_certificate     /etc/letsencrypt/live/pursuit.example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/pursuit.example.com/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;

    client_max_body_size 25M;

    # Long-running AI endpoints (dossier generate with web_search, parse with
    # vision) can take 60-150s. Carve them out with a longer read timeout so
    # nginx doesn't 504 before Claude finishes.
    location ~ ^/api/applications/[0-9]+/(dossier/refresh|interviews/parse)$ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
        proxy_connect_timeout 5s;
    }
    location = /api/applications/parse {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
        proxy_connect_timeout 5s;
    }

    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;

        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_connect_timeout 2s;
    }
}
