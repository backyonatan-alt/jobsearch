<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pursuit · First-run onboarding</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
/* ═══════════════════════════════════════════════════════════
   PURSUIT — design tokens (ported verbatim from design-system.css)
   ═══════════════════════════════════════════════════════════ */
:root {
  --surface: #fbfbfd;
  --surface-2: #f4f4f6;
  --card: #ffffff;

  --ink: #0a0a0d;
  --ink-2: #2a2a2e;
  --mute: #71717a;
  --mute-2: #a1a1ab;

  --rule: #e7e7eb;
  --rule-strong: #d4d4d8;

  --accent: oklch(0.62 0.19 258);
  --accent-strong: oklch(0.55 0.21 258);
  --accent-text: oklch(0.42 0.19 258);
  --accent-tint: oklch(0.96 0.03 258);
  --accent-tint-2: oklch(0.93 0.05 258);

  --positive: oklch(0.65 0.14 152);
  --positive-text: oklch(0.4 0.14 152);
  --positive-tint: oklch(0.96 0.05 152);

  --warm: oklch(0.7 0.16 50);
  --warm-text: oklch(0.5 0.18 50);
  --warm-tint: oklch(0.96 0.06 50);

  --danger: oklch(0.6 0.18 22);
  --danger-text: oklch(0.5 0.18 22);
  --danger-tint: oklch(0.96 0.04 22);

  --sh-1: 0 1px 0 rgba(10, 10, 13, 0.025);
  --sh-2: 0 1px 2px rgba(10, 10, 13, 0.04), 0 0 0 1px var(--rule);
  --sh-pop: 0 8px 24px -8px rgba(10, 10, 13, 0.12), 0 2px 4px rgba(10, 10, 13, 0.04);

  --sans: "Geist", -apple-system, system-ui, sans-serif;
  --mono: "Geist Mono", ui-monospace, "SF Mono", monospace;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }
body {
  background: var(--surface);
  color: var(--ink);
  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  font-feature-settings: "ss01", "cv11";
}
button { font: inherit; color: inherit; border: none; background: none; cursor: pointer; padding: 0; }
a { color: inherit; text-decoration: none; }

/* ── App shell ───────────────────────────────────────────── */
.app { display: grid; grid-template-columns: 216px 1fr; height: 100vh; min-height: 720px; }

/* ── Sidebar ─────────────────────────────────────────────── */
.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--rule);
  padding: 14px 12px;
  display: flex; flex-direction: column; gap: 4px; overflow: hidden;
}
.brand {
  display: grid; grid-template-columns: 22px 1fr; gap: 10px; align-items: center;
  padding: 6px 8px; margin-bottom: 12px; height: 32px; text-decoration: none;
}
.brand .brand-mark { color: var(--accent); }
.brand .name { font-weight: 600; letter-spacing: -0.015em; font-size: 14px; color: var(--ink); }

.nav-item {
  display: grid; grid-template-columns: 16px 1fr auto; gap: 10px; align-items: center;
  height: 30px; padding: 0 8px; border-radius: 6px; font-size: 13.5px;
  color: var(--ink-2); cursor: pointer; transition: background 80ms ease;
  background: transparent;
}
.nav-item:hover { background: var(--surface-2); }
.nav-item.active, .nav-item.active:hover { background: var(--ink); color: white; }
.nav-item.active .nav-icon, .nav-item.active .nav-count { color: rgba(255,255,255,0.85); }
.nav-icon { width: 16px; height: 16px; color: var(--mute); display: inline-flex; align-items: center; justify-content: center; }
.nav-count { font-size: 12px; font-weight: 500; color: var(--mute); font-variant-numeric: tabular-nums; }

.sidebar-footer { margin-top: auto; padding-top: 8px; }
.profile { display: grid; grid-template-columns: 26px 1fr 16px; gap: 10px; align-items: center; padding: 6px 8px; border-radius: 6px; cursor: pointer; width: 100%; text-align: left; }
.profile:hover { background: var(--surface-2); }
.profile .av {
  width: 26px; height: 26px; border-radius: 6px; background: var(--accent);
  color: white; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600;
}
.profile .who { font-size: 13px; font-weight: 500; min-width: 0; }
.profile .who small { display: block; font-weight: 400; color: var(--mute); font-size: 11.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.subnav-section { padding: 12px 8px 4px; font-size: 11.5px; font-weight: 500; color: var(--mute-2); }

/* ── Main column ─────────────────────────────────────────── */
.main { display: flex; flex-direction: column; min-width: 0; overflow: hidden; }

.topbar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 0 20px; height: 48px; border-bottom: 1px solid var(--rule);
  background: var(--surface); flex-shrink: 0;
}
.topbar.pad-wide { padding: 12px 28px; }
.crumb { display: flex; align-items: center; gap: 8px; font-size: 13.5px; }
.crumb .root { color: var(--mute); cursor: pointer; }
.crumb .root:hover { color: var(--ink); }
.crumb .sep { color: var(--mute-2); }
.crumb .here { font-weight: 600; font-size: 14px; }
.topbar .right { display: flex; align-items: center; gap: 8px; }
.search {
  display: flex; align-items: center; gap: 6px; background: var(--card);
  border: 1px solid var(--rule); border-radius: 7px; padding: 5px 10px;
  font-size: 13px; color: var(--mute); min-width: 280px;
}
.search .ico { width: 14px; height: 14px; flex-shrink: 0; }
.search > span:not(.kbd) { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; }
.search .kbd { margin-left: auto; font-family: var(--mono); font-size: 11px; color: var(--mute-2); }
.btn { background: var(--card); border: 1px solid var(--rule); border-radius: 7px; padding: 6px 11px; font-size: 13px; font-weight: 500; color: var(--ink); cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
.btn:hover { background: var(--surface-2); }
.btn-primary { background: var(--accent); border-color: var(--accent-strong); color: white; }
.btn-primary:hover { background: var(--accent-strong); }
.btn-primary .kbd { font-family: var(--mono); font-size: 11px; color: rgba(255,255,255,.75); }
.btn-danger { color: var(--danger-text); border-color: var(--rule); background: var(--card); }
.btn-danger:hover { background: var(--danger-tint); border-color: var(--danger-tint); }

.body { flex: 1; overflow-y: auto; padding: 28px; }
.body.board-body { padding: 30px 36px 60px; }
.body-inner { max-width: 1080px; margin: 0 auto; }

/* status pill base */
.pill { display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px; border-radius: 99px; font-size: 12px; font-weight: 500; background: var(--surface-2); color: var(--ink-2); width: max-content; }
.pill .pdot { width: 5px; height: 5px; border-radius: 50%; background: var(--mute-2); }
.pill.screen { background: var(--accent-tint); color: var(--accent-text); }
.pill.screen .pdot { background: var(--accent); }
.pill.interview { background: var(--warm-tint); color: var(--warm-text); }
.pill.interview .pdot { background: var(--warm); }
.pill.offer { background: var(--positive-tint); color: var(--positive-text); }
.pill.offer .pdot { background: var(--positive); }
.pill.applied { background: var(--surface-2); color: var(--ink-2); }
.pill.wishlist { background: var(--surface-2); color: var(--mute); }
.pill.rejected, .pill.withdrawn { background: var(--danger-tint); color: var(--danger-text); }
.pill.rejected .pdot, .pill.withdrawn .pdot { background: var(--danger); }

/* shared row-logo */
.row-logo { width: 30px; height: 30px; border-radius: 8px; background: var(--surface-2); object-fit: contain; padding: 4px; }
.row-logo.letter { display: grid; place-items: center; padding: 0; color: var(--ink-2); font-size: 12px; font-weight: 600; }

/* ════════════════ TODAY (two-pane) ════════════════ */
.ob { flex: 1; min-height: 0; display: grid; grid-template-columns: 1.08fr 0.92fr; font-family: var(--sans); color: var(--ink); }
.ob .brief { border-right: 1px solid var(--rule); overflow-y: auto; }
.brief-in { max-width: 640px; padding: 44px 40px 56px; }
.brief-date { font-size: 13px; color: var(--mute); margin-bottom: 16px; letter-spacing: -0.003em; }
.brief h1 { font-size: 26px; font-weight: 300; letter-spacing: -0.03em; line-height: 1.12; margin: 0 0 12px; }
.brief h1 b { font-weight: 500; }
.lede { font-size: 14.5px; color: var(--ink-2); line-height: 1.6; margin: 0 0 30px; max-width: 50ch; }
.lede .hot { color: var(--warm-text); font-weight: 500; }

.brief-head { display: flex; align-items: center; justify-content: space-between; gap: 20px; margin: 0 0 30px; flex-wrap: nowrap; }
.brief-head h1 { margin: 0; white-space: nowrap; }
.brief-stats { display: flex; align-items: center; flex-shrink: 0; }
.brief-stats .bstat { display: flex; flex-direction: column; align-items: flex-start; gap: 2px; cursor: pointer; padding: 0 14px; transition: opacity .12s; background: none; }
.brief-stats .bstat:first-child { padding-left: 0; }
.brief-stats .bstat:last-child { padding-right: 0; }
.brief-stats .bstat + .bstat { border-left: 1px solid var(--rule); }
.brief-stats .bstat:hover { opacity: 0.65; }
.brief-stats .bstat-n { font-size: 23px; font-weight: 500; line-height: 1; letter-spacing: -0.022em; color: var(--ink); font-variant-numeric: tabular-nums; }
.brief-stats .bstat-l { font-size: 11px; color: var(--mute); letter-spacing: -0.003em; white-space: nowrap; }
.brief-stats .bstat.warn .bstat-n { color: var(--warm-text); }

.kick { font-size: 11.5px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--mute-2); margin-bottom: 14px; display: flex; align-items: center; gap: 10px; }
.kick::after { content: ""; flex: 1; height: 1px; background: var(--rule); }
.suggest .sg:first-child, .recent .rrow:first-child, .agenda .ag-row:first-child { border-top: 0; }
.recent-kick { margin-top: 34px; }

.suggest { display: flex; flex-direction: column; }
.sg { display: grid; grid-template-columns: 22px 1fr auto; gap: 12px; align-items: center; padding: 13px 2px; border-top: 1px solid var(--rule); cursor: pointer; border-radius: 8px; transition: background .12s; }
.sg:hover { background: var(--surface-2); }
.sg-ic { display: grid; place-items: center; color: var(--accent-text); }
.sg-ic.plain { color: var(--mute-2); }
.sg-tx { line-height: 1.35; min-width: 0; }
.sg-tx b { font-size: 13.5px; font-weight: 500; color: var(--ink); }
.sg-tx small { display: block; font-size: 12.5px; color: var(--mute); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sg-go { display: inline-flex; align-items: center; gap: 5px; white-space: nowrap; font-size: 12.5px; font-weight: 500; color: var(--accent-text); }

.recent { display: flex; flex-direction: column; }
.rrow { display: grid; grid-template-columns: 30px 1fr auto auto; gap: 13px; align-items: center; padding: 13px 2px; border-top: 1px solid var(--rule); cursor: pointer; border-radius: 8px; transition: background .12s; }
.rrow:hover { background: var(--surface-2); }
.rx { line-height: 1.3; min-width: 0; }
.rx b { font-size: 13.5px; font-weight: 500; }
.rx small { display: block; font-size: 12.5px; color: var(--mute); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ago { font-size: 12px; color: var(--mute-2); white-space: nowrap; font-variant-numeric: tabular-nums; }

.insight { display: flex; gap: 12px; padding: 15px 16px; background: var(--accent-tint); border-radius: 13px; margin-bottom: 14px; }
.insight .ic { color: var(--accent-text); flex-shrink: 0; margin-top: 1px; }
.insight .tx { font-size: 13.5px; line-height: 1.55; color: var(--accent-text); }
.insight .tx b, .insight .tx em { font-weight: 600; font-style: normal; }

.brief-sub { font-size: 11.5px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--mute-2); margin: 24px 0 13px; }
.brief-review { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 11px; }
.brief-review li { font-size: 13.5px; line-height: 1.5; color: var(--ink-2); padding-left: 25px; position: relative; }
.brief-review li::before { content: ""; position: absolute; left: 4px; top: 4px; width: 6px; height: 10px; border: solid var(--accent-text); border-width: 0 1.7px 1.7px 0; transform: rotate(42deg); }
.brief-tip { display: flex; gap: 11px; font-size: 13px; line-height: 1.55; color: var(--mute); margin-top: 11px; }
.brief-tip .sp { color: var(--warm-text); flex-shrink: 0; margin-top: 2px; }
.brief-tip b { color: var(--ink-2); font-weight: 500; }

.meta { font-size: 13px; color: var(--mute); margin: 24px 0 16px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.meta b { color: var(--ink-2); font-weight: 500; }
.meta .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--mute-2); }

.cta { display: inline-flex; align-items: center; justify-content: center; gap: 8px; background: var(--ink); color: white; border: none; font-size: 13.5px; font-weight: 500; padding: 11px 18px; border-radius: 10px; cursor: pointer; transition: background .12s; }
.cta:hover { background: var(--ink-2); }

.agenda { margin-top: 36px; }
.ag-row { display: grid; grid-template-columns: 70px 1fr auto; gap: 14px; align-items: center; padding: 13px 2px; border-top: 1px solid var(--rule); font-size: 13.5px; cursor: pointer; transition: background .12s; }
.ag-row:hover { background: var(--surface-2); }
.ag-row .when { font-variant-numeric: tabular-nums; color: var(--mute); }
.ag-row .when b { color: var(--ink-2); font-weight: 500; }
.ag-row .co { font-weight: 500; }
.ag-row .role { color: var(--mute); font-size: 12.5px; }

.foot { margin-top: 28px; display: flex; justify-content: flex-end; }
.foot-link { background: none; border: none; padding: 4px 0; font-family: inherit; font-size: 12.5px; color: var(--mute); display: inline-flex; align-items: center; gap: 6px; cursor: pointer; transition: color .12s; }
.foot-link:hover { color: var(--accent-text); }

/* RIGHT pulse */
.pulse-stage { overflow-y: auto; background: radial-gradient(72% 50% at 50% 0%, oklch(0.97 0.028 258), transparent 70%), var(--surface); display: flex; flex-direction: column; justify-content: flex-start; padding: 40px 40px 46px; }
.pulse-tag { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--warm-text); display: inline-flex; align-items: center; gap: 7px; margin-bottom: 20px; }
.pulse-tag .d { width: 6px; height: 6px; border-radius: 50%; background: var(--warm); box-shadow: 0 0 0 3px var(--warm-tint); }
.pulse-sec { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 8px; }
.pulse-sec .t { font-size: 11.5px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--mute-2); }
.pulse-sec .c { font-size: 11px; color: var(--mute-2); }
.pulse-list { display: flex; flex-direction: column; }
.pulse-empty { font-size: 12.5px; color: var(--mute); padding: 14px 4px; border-top: 1px solid var(--rule); }
.pulse-row { display: grid; grid-template-columns: 30px 1fr auto auto; gap: 12px; align-items: center; padding: 12px 4px; border-top: 1px solid var(--rule); cursor: pointer; border-radius: 8px; transition: background .12s; }
.pulse-row:hover { background: var(--surface-2); }
.pulse-row .wx { line-height: 1.3; min-width: 0; }
.pulse-row .wx b { font-size: 13.5px; font-weight: 500; }
.pulse-row .wx small { display: block; font-size: 12px; color: var(--mute); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pulse-row .days { font-family: var(--mono); font-size: 12.5px; color: var(--mute); font-variant-numeric: tabular-nums; }
.pulse-row.quiet .days { color: var(--warm-text); font-weight: 500; }
.pulse-row .ok { width: 28px; display: flex; justify-content: center; }
.pulse-row .okdot { width: 7px; height: 7px; border-radius: 50%; background: var(--positive); box-shadow: 0 0 0 3px var(--positive-tint); }
.pulse-row .okdot.warn { background: var(--warm); box-shadow: 0 0 0 3px var(--warm-tint); }

.tasks { margin-top: 0; }
.tasks .pulse-sec { margin-bottom: 10px; }
.waiting-sec { margin-top: 32px; }
.task { display: grid; grid-template-columns: 22px 1fr auto; gap: 12px; align-items: center; padding: 11px 4px; border-top: 1px solid var(--rule); cursor: pointer; border-radius: 8px; transition: background .12s; }
.task:hover { background: var(--surface-2); }
.task .box { width: 18px; height: 18px; border-radius: 6px; border: 1.5px solid var(--rule-strong); background: var(--card); flex-shrink: 0; position: relative; }
.task.done .box { background: var(--positive); border-color: var(--positive); }
.task.done .box::after { content: ""; position: absolute; left: 5px; top: 2px; width: 4px; height: 8px; border: solid #fff; border-width: 0 1.6px 1.6px 0; transform: rotate(42deg); }
.task .tx { line-height: 1.35; min-width: 0; }
.task .tx b { font-size: 13.5px; font-weight: 500; }
.task.done .tx b { color: var(--mute); text-decoration: line-through; }
.task .tx small { display: block; font-size: 12px; color: var(--mute); }
.task .due { font-family: var(--mono); font-size: 11.5px; color: var(--mute); white-space: nowrap; }
.task .due.hot { color: var(--warm-text); }
.tasks-note { font-size: 11px; color: var(--mute-2); margin-top: 12px; padding-left: 4px; }

.pulse-foot { display: flex; align-items: center; gap: 13px; margin-top: 24px; padding: 13px 14px; background: var(--card); border: 1px solid var(--rule); border-radius: 12px; box-shadow: var(--sh-1); }
.pulse-foot .fic { flex-shrink: 0; width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; background: var(--warm-tint); color: var(--warm-text); }
.pulse-foot .ftx { flex: 1; font-size: 12.5px; color: var(--ink-2); line-height: 1.4; }
.pulse-foot .ftx b { font-weight: 600; }
.pulse-foot .ftx small { display: block; color: var(--mute); font-size: 11.5px; margin-top: 1px; }
.pulse-foot .pulse-link { flex-shrink: 0; display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; font-size: 12.5px; font-weight: 500; color: var(--ink-2); background: none; border: none; padding: 6px 4px; cursor: pointer; }
.pulse-foot .pulse-link:hover { color: var(--ink); }

/* ════════════════ BOARD ════════════════ */
.board-page { max-width: none; margin: 0; }
.board-hd { margin-bottom: 26px; }
.bdate { font-size: 13px; color: var(--mute); margin-bottom: 6px; letter-spacing: -0.003em; }
.board-hd h1 { font-size: 34px; font-weight: 500; letter-spacing: -0.035em; margin: 0 0 11px; color: var(--ink); }
.bsub { font-size: 13px; color: var(--mute); display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
.bsub b { color: var(--ink-2); font-weight: 600; }
.bsub .legend { display: inline-flex; align-items: center; gap: 7px; margin-left: 8px; padding-left: 15px; border-left: 1px solid var(--rule); }
.bsub .legend .rd { width: 8px; height: 8px; border-radius: 50%; background: var(--danger); flex-shrink: 0; }

.bcols { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 14px; align-items: start; overflow-x: auto; padding-bottom: 8px; }
.bcol { background: oklch(0.975 0.003 255); border: 1px solid var(--rule); border-radius: 14px; padding: 6px 8px 10px; min-height: 140px; transition: background 120ms ease, border-color 120ms ease; }
.bcol-h { display: flex; align-items: center; gap: 9px; padding: 8px 6px 16px; }
.bcol-tag { display: inline-flex; align-items: center; gap: 7px; font-size: 12.5px; font-weight: 500; padding: 4px 11px 4px 9px; border-radius: 999px; color: var(--ink-2); }
.bcol-tag .dot { width: 7px; height: 7px; border-radius: 50%; }
.bcol-tag.wishlist { background: var(--surface-2); } .bcol-tag.wishlist .dot { background: var(--mute-2); }
.bcol-tag.applied { background: var(--surface-2); } .bcol-tag.applied .dot { background: var(--mute); }
.bcol-tag.screen { background: var(--accent-tint); color: var(--accent-text); } .bcol-tag.screen .dot { background: var(--accent); }
.bcol-tag.interview { background: var(--warm-tint); color: var(--warm-text); } .bcol-tag.interview .dot { background: var(--warm); }
.bcol-tag.offer { background: var(--positive-tint); color: var(--positive-text); } .bcol-tag.offer .dot { background: var(--positive); }
.bcol-ct { font-size: 12px; color: var(--mute-2); font-variant-numeric: tabular-nums; }
.bcol-add { margin-left: auto; width: 24px; height: 24px; border-radius: 7px; border: none; background: none; color: var(--mute-2); font-size: 18px; line-height: 1; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 120ms, color 120ms; }
.bcol-add:hover { background: var(--surface-2); color: var(--ink-2); }
.bcol-list { display: flex; flex-direction: column; gap: 10px; }
.bcard { background: var(--card); border: 1px solid var(--rule); border-radius: 12px; padding: 13px 14px; box-shadow: var(--sh-1); cursor: grab; text-align: left; display: flex; flex-direction: column; gap: 0; width: 100%; overflow: hidden; transition: box-shadow 140ms ease, border-color 140ms ease, transform 140ms ease; }
.bcard:hover { box-shadow: var(--sh-pop); }
.bcard.stale { border-color: oklch(0.68 0.19 22 / 0.7); box-shadow: 0 0 0 1px oklch(0.68 0.19 22 / 0.18); }

function PulsePane(){
  const [tasks, setTasks] = useState([
    { id:'t-prep', b:'Prep 3 questions for Sarah', s:'Stripe · 1:1 with Sarah Chen', due:'Today', hot:true, done:false },
    { id:'t-offer', b:'Decide on the Anthropic offer', s:'$340k base + equity', due:'Soon', hot:true, done:false },
    { id:'t-quiet', b:'Follow up on Modal', s:'Quiet 15 days · log it once you reach out', due:'15d', hot:false, done:false },
  ]);
  const toggle = id => setTasks(ts=>ts.map(t=>t.id===id?{...t,done:!t.done}:t));
  const open = tasks.filter(t=>!t.done).length;
  return (
    <div className="pulse-stage">
      <div className="pulse-tag"><span className="d"></span>Where things stand</div>
      <div className="tasks">
        <div className="pulse-sec"><span className="t">Your move</span><span className="c">{open} to do</span></div>
        {tasks.map(t=>(
          <div key={t.id} className={`task ${t.done?'done':''}`} onClick={()=>toggle(t.id)}>
            <span className="box"></span>
            <span className="tx"><b>{t.b}</b><small>{t.s}</small></span>
            {t.due && <span className={`due ${t.hot&&!t.done?'hot':''}`}>{t.due}</span>}
          </div>
        ))}
        <div className="tasks-note">Personal checklist · stays on this device.</div>
      </div>
      <div className="pulse-foot">
        <span className="fic"><Spark s={15}/></span>
        <span className="ftx"><b>Replicate and Modal have gone quiet</b><small>No reply in over a week — it might be a good time to reach out to them directly.</small></span>
        <button className="pulse-link">See both <Arrow/></button>
      </div>
      <div className="pulse-sec waiting-sec"><span className="t">Waiting to hear back</span><span className="c">longest first</span></div>
      <div className="pulse-list">
        {WAITING.map(w=>(
          <div key={w.id} className={`pulse-row ${w.stale?'quiet':''}`}>
            <LetterLogo a={w} cls="row-logo"/>
            <span className="wx"><b>{w.co}</b><small>{StatusLabel[w.status]}</small></span>
            <span className="days">{w.applied}d</span>
            <span className="ok"><span className={`okdot ${w.stale?'warn':''}`}></span></span>
          </div>
        ))}
      </div>
    </div>
  );
}

                <div className="b1-process">

              {/* Likely interviewer */}

                <div className="person">
                  <div className="p-av">SC</div>
                  <div className="p-info">
                    <div className="p-name-row"><h4>{d.interviewer.name}</h4><span className="role-tag">Likely interviewer</span></div>
                    <div className="p-role">{d.interviewer.role}</div>
                    <div className="p-prior">{d.interviewer.prior.join(' · ')}</div>

                <div className="p-links">{d.interviewer.links.map((l,i)=><a key={i} href={l.href}>{l.label}</a>)}</div>

              {/* Lands / avoid */}
              <section className="la-grid">
                <div className="la-col lands">
                  <h3><span className="glyph">✓</span> What lands</h3>

                <div className="la-col avoid">

                  <ul>{d.avoid.map((l,i)=><li key={i}><span className="g">✕</span><span>{l}</span></li>)}</ul>

              {/* Signals */}
              <section className="card">
                <div className="card-hd"><h3>Recent signals</h3><span className="ai-tag">AI · web search</span></div>
                <ul className="signals">{d.signals.map((s,i)=>(
                  <li key={i}><span className="s-date">{s.date}</span><span className="s-body"><span className="s-kind">{s.kind}</span>{s.body}<span className="s-source">{s.source}</span></span></li>

              {/* Questions */}
              <section className="card">
                <div className="card-hd"><h3>Questions worth asking</h3></div>

                ))}</div>

              <div className="prep-disclaimer">
                Synthesised from public posts, talks, and papers · refreshed 12 min ago · always verify before you walk in
                <button className="prep-refresh"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M2 6a4 4 0 1 1 1.2 2.8M2 4v2h2"/></svg>Refresh prep</button>
              </div>

              {/* Activity */}
              <section className="card activity">
                <div className="act-hd">

                  <div className="act-actions">
                    <button className="ghost-btn">+ Log a follow-up</button>
                    <button className="ghost-btn">+ Add a note</button>
                    <button className="ghost-btn">+ Log an event</button>

                <ul className="timeline">{timeline.map((e,i)=>(
                  <li key={i} className={`tl-row ${e.tag}`}>
                    <span className="tl-rail"><span className="tl-dot"></span></span>
                    <span className="tl-date">{e.date}</span>
                    <span className="tl-body"><span className="tl-title">{e.title}</span><span className="tl-note">{e.note}</span></span>

            </div>

            <aside className="rail">
              <div className="next-card">
                <div className="nc-kicker"><span className="nc-dot"></span>NEXT INTERVIEW</div>

                <div className="nc-rows">
                  <div className="nc-row">Sarah Chen (Likely interviewer)</div>
                  <div className="nc-row">Google Meet</div>

              </div>
              <div className="rail-card">
                <div className="rc-hd">Details</div>
                <dl className="kv">
                  <dt>Status</dt><dd>{StatusLabel[a.status]}</dd>
                  <dt>Source</dt><dd>{a.source}</dd>
                  <dt>Location</dt><dd>{a.loc}</dd>
                  <dt>Salary</dt><dd>{a.salary}</dd>
                  <dt>Last activity</dt><dd>today</dd>
                </dl>
              </div>
              <div className="rail-card">
                <div className="rc-hd">Contact</div>
                <p className="contact-empty">No hiring manager yet.</p>
                <button className="add-hm"><svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.6"><path d="M8 3v10M3 8h10" strokeLinecap="round"/></svg>Add hiring manager</button>
              </div>
            </aside>
          </div>
        </div>
      </div>
    </>
  );
}

/* ════════════ INSIGHTS ════════════ */
function Insights(){
  // funnel cumulative
  const fc = { applied:0, screen:0, interview:0, offer:0 };
  APPS.forEach(a=>{
    const s=a.status;
    if(['applied','screen','interview','offer','rejected','withdrawn'].includes(s)) fc.applied++;
    if(['screen','interview','offer'].includes(s)) fc.screen++;
    if(['interview','offer'].includes(s)) fc.interview++;
    if(s==='offer') fc.offer++;
  });
  const stages = [
    { label:'Applied', n:fc.applied, color:'oklch(0.62 0.19 258)' },
    { label:'Screen', n:fc.screen, color:'oklch(0.62 0.19 258 / 0.78)' },
    { label:'Interview', n:fc.interview, color:'oklch(0.7 0.16 50)' },
    { label:'Offer', n:fc.offer, color:'oklch(0.65 0.14 152)' },
  ];
  const activeCount = APPS.filter(a=>!['wishlist','rejected','withdrawn'].includes(a.status)).length;
  const replyRate = Math.round((fc.screen/fc.applied)*100);

  // activity weeks (12 buckets) using applied days-ago
  const weeks = Array.from({length:12},(_,i)=>({count:0,label:''}));
  APPS.forEach(a=>{ if(a.applied==null) return; const w=11-Math.floor(a.applied/7); if(w>=0&&w<12) weeks[w].count++; });
  const months=['Mar','Apr','May','Jun'];
  weeks.forEach((w,i)=>{ if(i%3===0) w.label=months[i/3]||''; });
  const actMax = Math.max(1,...weeks.map(w=>w.count));

  // sources
  const map={}; const total=APPS.filter(a=>a.status!=='wishlist').length;
  APPS.forEach(a=>{ if(a.status==='wishlist')return; const s=(a.source&&a.source!=='—')?a.source:'Direct'; map[s]=(map[s]||0)+1; });
  const maxN=Math.max(1,...Object.values(map));
  const sources=Object.entries(map).map(([src,n])=>({src,n,pct:Math.round((n/total)*100),bar:Math.round((n/maxN)*100)})).sort((a,b)=>b.n-a.n);

  return (
    <>
      <div className="topbar"><div className="crumb"><span className="here">Insights</span></div></div>
      <div className="body">
        <div className="body-inner">
          <div className="ins-header"><h1>Insights</h1><div className="sub">How your search is actually going · last 12 weeks</div></div>
          <div className="ins-kpis">
            <div className="kpi"><div className="kpi-l">Reply rate</div><div className="kpi-v">{replyRate}<span className="kpi-unit">%</span></div><div className="kpi-delta flat">based on your {fc.applied} applications</div></div>
            <div className="kpi"><div className="kpi-l">Avg. time to first reply</div><div className="kpi-v">14<span className="kpi-unit">d</span></div><div className="kpi-delta flat">proxy: days from applied to screen</div></div>
            <div className="kpi"><div className="kpi-l">Furthest stage reached</div><div className="kpi-v kpi-v-stage">Offer <span className="kpi-count">×1</span></div><div className="kpi-delta flat">Anthropic</div></div>
          </div>
          <div className="ins-grid">
            <div className="panel">
              <div className="ph">Pipeline funnel</div>
              <div className="psub">Where your {activeCount} active applications sit today</div>
              <div data-tour="funnel" className="funnel">
                {stages.map((s,i)=>{
                  const width=Math.max(4,(s.n/fc.applied)*100);
                  const pct=Math.round((s.n/fc.applied)*100);
                  return (
                    <div key={i} className="fn">
                      <span className="fn-l">{s.label}</span>
                      <span className="fn-bar" style={{width:width+'%',background:s.color}}></span>
                      <span className="fn-n">{s.n}</span>
                      <span className="fn-pct">{pct}%</span>
                    </div>
                  );
                })}
              </div>
              <div className="divider"></div>
              <div className="ph">Application activity</div>
              <div className="psub">New applications per week</div>
              <div className="act-bars">
                {weeks.map((w,i)=>{
                  const h=Math.max(6,(w.count/actMax)*100);
                  return (
                    <div key={i} className="act-col" title={`${w.count} applications`}>
                      {w.count>0 && <span className="act-val">{w.count}</span>}
                      <div className={`act-bar ${i===weeks.length-1?'act-bar-current':''}`} style={{height:h+'%'}}></div>
                    </div>
                  );
                })}
              </div>
              <div className="act-x">{weeks.map((w,i)=><span key={i}>{w.label}</span>)}</div>
            </div>
            <div className="panel">
              <div className="ph">Where they come from</div>
              <div className="psub">Sorted by volume</div>
              <div className="src-list">
                {sources.map((r,i)=>(
                  <div key={i} className="src-row">
                    <div className="src-meta"><span className="src-nm">{r.src}</span><span className="src-track"><i style={{width:r.bar+'%'}}></i></span></div>
                    <span className="src-cnt">{r.n}</span>
                    <span className="src-pct">{r.pct}%</span>
                  </div>
                ))}
              </div>
              <div className="insight-callout">
                <span className="spark-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5L12 2Z" fill="currentColor" opacity="0.9"/></svg></span>
                <span className="insight-txt">Your 3 referral applications reached a screen or further. Cold apps stall at the inbox — lean on intros.</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </>
  );
}

/* ════════════ APP ════════════ */
function App(){
  const [view, setView] = useState('today');
  const [active, setActive] = useState(true);      // onboarding showing for a new user
  const [nux, setNux] = useState(0);               // remount key = "new user"
  const T = window.TourDesigns || {};

  const replay = ()=>{ setView('today'); setActive(true); setNux(n=>n+1); };
  const dismiss = ()=> setActive(false);

  return (
    <div className="app">
      <Sidebar view={view} setView={setView}/>
      <section className="main">
        {view==='today' && <TodayInterview/>}
        {view==='today-empty' && <TodayEmpty/>}
        {view==='board' && <Board/>}
        {view==='detail' && <Detail/>}
        {view==='insights' && <Insights/>}
      </section>
      {active && T.CoachBubble && <T.CoachBubble key={'ob'+nux} view={view} setView={setView} onClose={dismiss}/>}
      {T.Harness && <T.Harness active={active} replay={replay} dismiss={dismiss}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
